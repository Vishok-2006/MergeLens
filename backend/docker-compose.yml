services:
  postgres:
    image: postgres:16-alpine
    container_name: mergelens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mergelens
    ports:
      - "5432:5432"
    volumes:
      - mergelens_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mergelens-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - mergelens_qdrant_data:/qdrant/storage

volumes:
  mergelens_postgres_data:
  mergelens_qdrant_data:
