spring:
  application.name: ${APP_NAME:MergeLens}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate.ddl-auto: update
    open-in-view: false
    properties.hibernate.dialect: org.hibernate.dialect.MySQLDialect

server.port: ${SERVER_PORT}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  github:
    token: ${GITHUB_TOKEN:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
  qdrant:
    url: ${QDRANT_URL}
    collection: ${QDRANT_COLLECTION}
    vector-size: ${QDRANT_VECTOR_SIZE}
    distance: ${QDRANT_DISTANCE}
    api-key: ${QDRANT_API_KEY:}
  rag:
    top-k-results: ${TOP_K_RESULTS}
    similarity-threshold: ${SIMILARITY_THRESHOLD}
    max-chunk-size: ${MAX_CHUNK_SIZE}
    chunk-overlap: ${CHUNK_OVERLAP}
  ai:
    provider: ${AI_PROVIDER:nvidia}
    timeout-ms: ${AI_TIMEOUT_MS:30000}
    nvidia:
      base-url: ${NVIDIA_BASE_URL}
      api-key: ${NVIDIA_API_KEY:}
      chat-model: ${NVIDIA_CHAT_MODEL}
      embedding-model: ${NVIDIA_EMBEDDING_MODEL}
    groq:
      base-url: ${GROQ_BASE_URL:}
      api-key: ${GROQ_API_KEY:}
      model: ${GROQ_MODEL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
